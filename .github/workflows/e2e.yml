# E2E-Smoke-Test gegen das Live-Deployment (manuell startbar).
# Läuft auf dem Runner mit frischer IP — nützlich, wenn die iTunes-API
# die eigene Entwickler-IP gerade drosselt, und als Regressionsschutz.
name: E2E Smoke (live)

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install playwright
      - run: npx playwright install --with-deps chromium
      - run: mkdir -p shots && node e2e/smoke.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: shots/
