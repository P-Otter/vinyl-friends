name: VinylFriends
options:
  bundleIdPrefix: com.shasha
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
  AppStore: release   # öffentliche Variante: Spotify rauskompiliert (APPSTORE-Flag)
targets:
  VinylFriends:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Vinyl Friends
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppleMusicUsageDescription: Vinyl Friends spielt damit deine Songs aus Apple Music ab.
        # Kein CFBundleURLTypes nötig: der Spotify-OAuth-Callback läuft über
        # ASWebAuthenticationSession (callbackURLScheme), das keine Info.plist-
        # Registrierung braucht. So bleibt der Store-Build ohne Custom-Scheme.
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        AppStore:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: APPSTORE
