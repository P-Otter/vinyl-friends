name: HitsterFriends
options:
  bundleIdPrefix: com.shasha
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  HitsterFriends:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Vinyl Friends
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppleMusicUsageDescription: Wird für die Apple-Music-Wiedergabe im Spiel benötigt.
        CFBundleURLTypes:
          - CFBundleURLName: com.shasha.HitsterFriends
            CFBundleURLSchemes:
              - hitsterfriends
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
